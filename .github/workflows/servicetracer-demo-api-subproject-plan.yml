name: ServiceTracer demo API subproject plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Lab environment'
        required: true
        default: dev
        type: choice
        options: [dev, test]
      location:
        description: 'Approved target Azure Plan region'
        required: true
        default: westus2
        type: string
      prefix:
        description: 'Resource-name prefix'
        required: true
        default: mst
        type: string
      dependency_resource_group:
        description: 'Existing ServiceTracer dependency resource group'
        required: true
        default: rg-servicetracer-dev-westus2
        type: string
      dns_label:
        description: 'Globally unique public DNS label'
        required: true
        default: st-demo-api-vm-aeg30000
        type: string
      allowed_origin:
        description: 'Exact browser origin allowed by CORS'
        required: true
        default: https://anthonyedgar30000.github.io
        type: string
      vm_size:
        description: 'Approved read-only planning candidate; deployment still requires fresh cost and runtime evidence'
        required: true
        default: Standard_F1als_v7
        type: string
      maximum_monthly_cost_cad:
        description: 'Human planning ceiling only; no price claim is inferred'
        required: true
        default: '25.00'
        type: string
      confirmation:
        description: 'Enter PLAN-DEMO-API-SUBPROJECT:<environment>:<dns-label>'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: servicetracer-demo-api-subproject-plan-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AZURE_CORE_ONLY_SHOW_ERRORS: 'true'
  ARTIFACT_DIR: servicetracer-demo-api-subproject-plan-evidence

jobs:
  plan:
    name: Plan independent ServiceTracer demo API workload
    runs-on: ubuntu-latest
    environment: azure-api-payg
    timeout-minutes: 45
    steps:
      - name: Check out immutable dispatch state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Validate main-bound dual-subscription read-only authority
        env:
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          DEPENDENCY_RESOURCE_GROUP: ${{ inputs.dependency_resource_group }}
          DNS_LABEL: ${{ inputs.dns_label }}
          ALLOWED_ORIGIN: ${{ inputs.allowed_origin }}
          VM_SIZE: ${{ inputs.vm_size }}
          MAXIMUM_MONTHLY_COST_CAD: ${{ inputs.maximum_monthly_cost_cad }}
          CONFIRMATION: ${{ inputs.confirmation }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DEPENDENCY_CLIENT_ID: ${{ secrets.AZURE_DEPENDENCY_CLIENT_ID }}
          DEPENDENCY_SUBSCRIPTION_ID: ${{ secrets.AZURE_DEPENDENCY_SUBSCRIPTION_ID }}
          TARGET_CLIENT_ID: ${{ secrets.AZURE_TARGET_CLIENT_ID }}
          TARGET_SUBSCRIPTION_ID: ${{ secrets.AZURE_TARGET_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          [[ "$GITHUB_REF" == 'refs/heads/main' ]]
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$LAB_ENVIRONMENT" =~ ^(dev|test)$ ]]
          [[ "$LOCATION" == 'westus2' ]]
          [[ "$VM_SIZE" == 'Standard_F1als_v7' ]]
          [[ "$PREFIX" =~ ^[a-z0-9]{2,12}$ ]]
          [[ "$DEPENDENCY_RESOURCE_GROUP" =~ ^rg-servicetracer-(dev|test)(-[a-z0-9-]+)?$ ]]
          [[ "$DNS_LABEL" =~ ^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$ ]]
          [[ "$ALLOWED_ORIGIN" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?$ ]]
          [[ "$MAXIMUM_MONTHLY_COST_CAD" =~ ^[0-9]+([.][0-9]{1,2})?$ ]]
          for value in "$AZURE_TENANT_ID" "$DEPENDENCY_CLIENT_ID" "$DEPENDENCY_SUBSCRIPTION_ID" "$TARGET_CLIENT_ID" "$TARGET_SUBSCRIPTION_ID"; do
            [[ "$value" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]
          done
          [[ "$DEPENDENCY_CLIENT_ID" != "$TARGET_CLIENT_ID" ]]
          [[ "$DEPENDENCY_SUBSCRIPTION_ID" != "$TARGET_SUBSCRIPTION_ID" ]]
          expected="PLAN-DEMO-API-SUBPROJECT:${LAB_ENVIRONMENT}:${DNS_LABEL}"
          [[ "$CONFIRMATION" == "$expected" ]] || {
            echo "Confirmation must exactly equal: $expected" >&2
            exit 1
          }
          target_resource_group="rg-st-demo-api-${LAB_ENVIRONMENT}-${LOCATION}"
          jq -n \
            --arg dispatch_sha "$GITHUB_SHA" \
            --arg ref "$GITHUB_REF" \
            --arg environment "$LAB_ENVIRONMENT" \
            --arg location "$LOCATION" \
            --arg prefix "$PREFIX" \
            --arg dependency_resource_group "$DEPENDENCY_RESOURCE_GROUP" \
            --arg target_resource_group "$target_resource_group" \
            --arg dns_label "$DNS_LABEL" \
            --arg allowed_origin "$ALLOWED_ORIGIN" \
            --arg vm_size "$VM_SIZE" \
            --arg maximum_monthly_cost_cad "$MAXIMUM_MONTHLY_COST_CAD" \
            '{schema_version:"servicetracer.demo-api-subproject-plan-request.v3",dispatch_sha:$dispatch_sha,ref:$ref,environment:$environment,location:$location,prefix:$prefix,dependency_resource_group:$dependency_resource_group,target_resource_group:$target_resource_group,dns_label:$dns_label,allowed_origin:$allowed_origin,vm_size:$vm_size,maximum_monthly_cost_cad:($maximum_monthly_cost_cad|tonumber),subscription_boundary:"dual_subscription",github_environment:"azure-api-payg",dependency_subscription_read_only:true,target_subscription_planning_only:true,provider_validation_level:"ProviderNoRbac",azure_authentication_authorized:true,credential_creation_authorized:false,azure_mutations_authorized:false,deployment_authorized:false}' \
            > "$ARTIFACT_DIR/request.json"

      - name: Run subproject tests before Azure login
        run: python -m unittest discover -s workloads/servicetracer-demo-api/tests -v

      - name: Log in to dependency subscription with workload identity federation
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPENDENCY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_DEPENDENCY_SUBSCRIPTION_ID }}

      - name: Capture read-only ServiceTracer dependency state
        env:
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          PREFIX: ${{ inputs.prefix }}
          DEPENDENCY_RESOURCE_GROUP: ${{ inputs.dependency_resource_group }}
          DEPENDENCY_SUBSCRIPTION_ID: ${{ secrets.AZURE_DEPENDENCY_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail
          suffix="${PREFIX}-${LAB_ENVIRONMENT}"
          az account show --query '{subscriptionId:id,subscriptionName:name,tenantId:tenantId,state:state,user:user}' --output json > "$ARTIFACT_DIR/dependency-azure-context.json"
          jq -e --arg subscription "$DEPENDENCY_SUBSCRIPTION_ID" --arg tenant "$AZURE_TENANT_ID" '.subscriptionId==$subscription and .tenantId==$tenant and .state=="Enabled"' "$ARTIFACT_DIR/dependency-azure-context.json" > /dev/null
          az group show --name "$DEPENDENCY_RESOURCE_GROUP" --output json > "$ARTIFACT_DIR/dependency-resource-group.json"
          az network public-ip show \
            --resource-group "$DEPENDENCY_RESOURCE_GROUP" \
            --name "pip-remote-access-${suffix}" \
            --output json > "$ARTIFACT_DIR/dependency-public-ip.json"
          jq -e '.provisioningState=="Succeeded" and .ipAddress!=null and .ipAddress!=""' "$ARTIFACT_DIR/dependency-public-ip.json" > /dev/null

      - name: Log in to target Azure Plan subscription with workload identity federation
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_TARGET_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_TARGET_SUBSCRIPTION_ID }}

      - name: Capture and assess target provider, policy, quota, SKU, and resource state
        env:
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          LOCATION: ${{ inputs.location }}
          VM_SIZE: ${{ inputs.vm_size }}
          TARGET_SUBSCRIPTION_ID: ${{ secrets.AZURE_TARGET_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail
          target_resource_group="rg-st-demo-api-${LAB_ENVIRONMENT}-${LOCATION}"
          az account show --query '{subscriptionId:id,subscriptionName:name,tenantId:tenantId,state:state,user:user}' --output json > "$ARTIFACT_DIR/target-azure-context.json"
          jq -e --arg subscription "$TARGET_SUBSCRIPTION_ID" --arg tenant "$AZURE_TENANT_ID" '.subscriptionId==$subscription and .tenantId==$tenant and .state=="Enabled"' "$ARTIFACT_DIR/target-azure-context.json" > /dev/null
          az provider show --namespace Microsoft.Compute --query '{namespace:namespace,registrationState:registrationState}' --output json > "$ARTIFACT_DIR/provider-compute.json"
          az provider show --namespace Microsoft.Network --query '{namespace:namespace,registrationState:registrationState}' --output json > "$ARTIFACT_DIR/provider-network.json"
          az policy assignment list --disable-scope-strict-match true --output json > "$ARTIFACT_DIR/target-policy-assignments.json"
          az vm list-usage --location "$LOCATION" --output json > "$ARTIFACT_DIR/compute-usage.json"
          az network list-usages --location "$LOCATION" --output json > "$ARTIFACT_DIR/network-usage.json"
          az vm list-skus --location "$LOCATION" --size "$VM_SIZE" --all --output json > "$ARTIFACT_DIR/vm-size-availability.json"

          group_stdout="$ARTIFACT_DIR/existing-target-resource-group.raw.json"
          group_stderr="$ARTIFACT_DIR/existing-target-resource-group.error.txt"
          set +e
          az group show --name "$target_resource_group" --output json > "$group_stdout" 2> "$group_stderr"
          group_show_exit_status=$?
          set -e

          if (( group_show_exit_status == 0 )); then
            mv "$group_stdout" "$ARTIFACT_DIR/existing-target-resource-group.json"
            resources_stdout="$ARTIFACT_DIR/existing-target-resources.raw.json"
            resources_stderr="$ARTIFACT_DIR/existing-target-resources.error.txt"
            set +e
            az resource list --resource-group "$target_resource_group" --output json > "$resources_stdout" 2> "$resources_stderr"
            resource_list_exit_status=$?
            set -e
            if (( resource_list_exit_status == 0 )); then
              mv "$resources_stdout" "$ARTIFACT_DIR/existing-target-resources.json"
              jq -n \
                --arg resource_group "$target_resource_group" \
                --argjson group_show_exit_status "$group_show_exit_status" \
                --argjson resource_list_exit_status "$resource_list_exit_status" \
                '{status:"observed_existing",resource_group:$resource_group,group_show_exit_status:$group_show_exit_status,resource_list_exit_status:$resource_list_exit_status,error_code:null,evidence_authoritative:true}' \
                > "$ARTIFACT_DIR/target-resource-group-state.json"
            else
              rm -f "$resources_stdout"
              jq -n \
                --arg resource_group "$target_resource_group" \
                --arg stage "resource_list" \
                --argjson group_show_exit_status "$group_show_exit_status" \
                --argjson resource_list_exit_status "$resource_list_exit_status" \
                '{status:"observation_failed",resource_group:$resource_group,stage:$stage,group_show_exit_status:$group_show_exit_status,resource_list_exit_status:$resource_list_exit_status,error_code:null,evidence_authoritative:false}' \
                > "$ARTIFACT_DIR/target-resource-group-state.json"
              jq -n '{status:"not_observed",resources:null,evidence_authoritative:false}' > "$ARTIFACT_DIR/existing-target-resources.json"
            fi
          elif grep -Eq '(^|[^[:alnum:]_])ResourceGroupNotFound([^[:alnum:]_]|$)' "$group_stderr"; then
            rm -f "$group_stdout"
            jq -n \
              --arg resource_group "$target_resource_group" \
              --argjson group_show_exit_status "$group_show_exit_status" \
              --rawfile error "$group_stderr" \
              '{status:"not_present",resource_group:$resource_group,group_show_exit_status:$group_show_exit_status,error_code:"ResourceGroupNotFound",error:$error,evidence_authoritative:true}' \
              > "$ARTIFACT_DIR/existing-target-resource-group.json"
            jq -n \
              --arg resource_group "$target_resource_group" \
              --argjson group_show_exit_status "$group_show_exit_status" \
              '{status:"not_present",resource_group:$resource_group,group_show_exit_status:$group_show_exit_status,resource_list_exit_status:null,error_code:"ResourceGroupNotFound",evidence_authoritative:true}' \
              > "$ARTIFACT_DIR/target-resource-group-state.json"
            printf '[]\n' > "$ARTIFACT_DIR/existing-target-resources.json"
          else
            rm -f "$group_stdout"
            jq -n \
              --arg resource_group "$target_resource_group" \
              --argjson group_show_exit_status "$group_show_exit_status" \
              --rawfile error "$group_stderr" \
              '{status:"observation_failed",resource_group:$resource_group,group_show_exit_status:$group_show_exit_status,error_code:null,error:$error,evidence_authoritative:false}' \
              > "$ARTIFACT_DIR/existing-target-resource-group.json"
            jq -n \
              --arg resource_group "$target_resource_group" \
              --arg stage "group_show" \
              --argjson group_show_exit_status "$group_show_exit_status" \
              '{status:"observation_failed",resource_group:$resource_group,stage:$stage,group_show_exit_status:$group_show_exit_status,resource_list_exit_status:null,error_code:null,evidence_authoritative:false}' \
              > "$ARTIFACT_DIR/target-resource-group-state.json"
            jq -n '{status:"not_observed",resources:null,evidence_authoritative:false}' > "$ARTIFACT_DIR/existing-target-resources.json"
          fi

          jq -n \
            --arg vm_size "$VM_SIZE" \
            --slurpfile sku "$ARTIFACT_DIR/vm-size-availability.json" \
            '{vm_size:$vm_size,matching_records:([$sku[0][] | select(.name==$vm_size)] | length),unrestricted_records:([$sku[0][] | select(.name==$vm_size and ((.restrictions // []) | length)==0)] | length),restrictions:[$sku[0][] | select(.name==$vm_size) | (.restrictions // [])[]?]}' \
            > "$ARTIFACT_DIR/vm-size-assessment.json"

          required_cores="$(jq -r --arg vm_size "$VM_SIZE" '[.[] | select(.name==$vm_size) | .capabilities[]? | select(.name=="vCPUs") | .value] | first // 0' "$ARTIFACT_DIR/vm-size-availability.json")"
          [[ "$required_cores" =~ ^[0-9]+$ ]]
          jq -n \
            --argjson required_cores "$required_cores" \
            --slurpfile usage "$ARTIFACT_DIR/compute-usage.json" \
            '{required_cores:$required_cores,total_regional_cores:([$usage[0][] | select(.name.value=="cores")][0] // null)} | . + {sufficient:(.total_regional_cores!=null and ((.total_regional_cores.currentValue|tonumber) + .required_cores <= (.total_regional_cores.limit|tonumber)))}' \
            > "$ARTIFACT_DIR/compute-quota-assessment.json"

          python workloads/servicetracer-demo-api/scripts/assess_target_readiness.py \
            --vm-size "$VM_SIZE" \
            --provider-compute "$ARTIFACT_DIR/provider-compute.json" \
            --provider-network "$ARTIFACT_DIR/provider-network.json" \
            --vm-size-availability "$ARTIFACT_DIR/vm-size-availability.json" \
            --compute-usage "$ARTIFACT_DIR/compute-usage.json" \
            --network-usage "$ARTIFACT_DIR/network-usage.json" \
            --target-resource-group-state "$ARTIFACT_DIR/target-resource-group-state.json" \
            --existing-target-resources "$ARTIFACT_DIR/existing-target-resources.json" \
            --output "$ARTIFACT_DIR/target-readiness-assessment.json"

          if ! jq -e '.status=="ready_for_arm_what_if"' "$ARTIFACT_DIR/target-readiness-assessment.json" > /dev/null; then
            reasons="$(jq -c '.blocking_reasons' "$ARTIFACT_DIR/target-readiness-assessment.json")"
            echo "::error title=Target readiness rejected::${reasons}"
            exit 1
          fi

      - name: Validate and capture target-subscription What-If
        env:
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          DEPENDENCY_RESOURCE_GROUP: ${{ inputs.dependency_resource_group }}
          DNS_LABEL: ${{ inputs.dns_label }}
          ALLOWED_ORIGIN: ${{ inputs.allowed_origin }}
          VM_SIZE: ${{ inputs.vm_size }}
          TARGET_SUBSCRIPTION_ID: ${{ secrets.AZURE_TARGET_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          jq -e --arg subscription "$TARGET_SUBSCRIPTION_ID" '.subscriptionId==$subscription' "$ARTIFACT_DIR/target-azure-context.json" > /dev/null
          jq -e '.status=="ready_for_arm_what_if"' "$ARTIFACT_DIR/target-readiness-assessment.json" > /dev/null
          suffix="${PREFIX}-${LAB_ENVIRONMENT}"
          target_resource_group="rg-st-demo-api-${LAB_ENVIRONMENT}-${LOCATION}"
          backend_ip="$(jq -r '.ipAddress' "$ARTIFACT_DIR/dependency-public-ip.json")"
          backend_transaction_url="https://${backend_ip}/transaction"
          source_repository="https://github.com/${GITHUB_REPOSITORY}.git"
          installer_uri="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/workloads/servicetracer-demo-api/scripts/install.sh"
          admin_ssh_public_key='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFhmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZm servicetracer-plan-placeholder-no-private-key'

          jq -n \
            --arg target_resource_group "$target_resource_group" \
            --arg dependency_resource_group "$DEPENDENCY_RESOURCE_GROUP" \
            --arg backend_transaction_url "$backend_transaction_url" \
            --arg source_repository "$source_repository" \
            --arg source_ref "$GITHUB_SHA" \
            --arg installer_uri "$installer_uri" \
            '{target_resource_group:$target_resource_group,dependency_resource_group:$dependency_resource_group,backend_transaction_url:$backend_transaction_url,source_repository:$source_repository,source_ref:$source_ref,installer_uri:$installer_uri,subscription_boundary:"dual_subscription",provider_validation_level:"ProviderNoRbac",dependency_subscription_read_only:true,target_subscription_planning_only:true,credential_creation_authorized:false}' \
            > "$ARTIFACT_DIR/effective-parameters.json"

          parameters=(
            prefix="$PREFIX"
            environment="$LAB_ENVIRONMENT"
            location="$LOCATION"
            dnsLabel="$DNS_LABEL"
            allowedOrigin="$ALLOWED_ORIGIN"
            backendTransactionUrl="$backend_transaction_url"
            vmSize="$VM_SIZE"
            adminSshPublicKey="$admin_ssh_public_key"
            sourceRepository="$source_repository"
            sourceRef="$GITHUB_SHA"
            installerUri="$installer_uri"
          )
          deployment_name="servicetracer-demo-api-plan-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          az deployment sub validate \
            --name "$deployment_name" \
            --location "$LOCATION" \
            --template-file workloads/servicetracer-demo-api/infra/main.bicep \
            --parameters "${parameters[@]}" \
            --validation-level ProviderNoRbac \
            --output json > "$ARTIFACT_DIR/arm-validation.json"

          az deployment sub what-if \
            --name "$deployment_name" \
            --location "$LOCATION" \
            --template-file workloads/servicetracer-demo-api/infra/main.bicep \
            --parameters "${parameters[@]}" \
            --validation-level ProviderNoRbac \
            --no-pretty-print \
            --result-format FullResourcePayloads \
            --output json > "$ARTIFACT_DIR/arm-what-if.json"

          python workloads/servicetracer-demo-api/scripts/assert_what_if.py \
            --input "$ARTIFACT_DIR/arm-what-if.json" \
            --output "$ARTIFACT_DIR/what-if-assessment.json" \
            --target-resource-group "$target_resource_group" \
            --dependency-resource-group "$DEPENDENCY_RESOURCE_GROUP" \
            --suffix "$suffix"
          jq -e '.status=="accepted_independent_workload_create_plan" and .deployment_authorized==false and .azure_mutations_performed==false' "$ARTIFACT_DIR/what-if-assessment.json" > /dev/null

      - name: Write evidence manifest
        if: always()
        run: |
          set -euo pipefail
          if [[ -d "$ARTIFACT_DIR" ]]; then
            find "$ARTIFACT_DIR" -type f ! -name artifact-manifest.sha256 -print0 \
              | sort -z \
              | xargs -0 -r sha256sum \
              > "$ARTIFACT_DIR/artifact-manifest.sha256"
          fi

      - name: Write planning summary
        if: always()
        env:
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          LOCATION: ${{ inputs.location }}
          DNS_LABEL: ${{ inputs.dns_label }}
          VM_SIZE: ${{ inputs.vm_size }}
        run: |
          dependency_name="$(jq -r '.subscriptionName // "not-observed"' "$ARTIFACT_DIR/dependency-azure-context.json" 2>/dev/null || echo not-observed)"
          target_name="$(jq -r '.subscriptionName // "not-observed"' "$ARTIFACT_DIR/target-azure-context.json" 2>/dev/null || echo not-observed)"
          readiness_status="$(jq -r '.status // "not-observed"' "$ARTIFACT_DIR/target-readiness-assessment.json" 2>/dev/null || echo not-observed)"
          readiness_reasons="$(jq -c '.blocking_reasons // []' "$ARTIFACT_DIR/target-readiness-assessment.json" 2>/dev/null || echo '[]')"
          {
            echo '## ServiceTracer demo API independent workload plan'
            echo
            echo "- Dispatch SHA: \`$GITHUB_SHA\`"
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- GitHub environment: \`azure-api-payg\`"
            echo "- Dependency subscription: \`$dependency_name\` (read-only source)"
            echo "- Target subscription: \`$target_name\` (read-only planning target)"
            echo "- Target resource group: \`rg-st-demo-api-${LAB_ENVIRONMENT}-${LOCATION}\`"
            echo "- DNS label: \`$DNS_LABEL\`"
            echo "- VM size: \`$VM_SIZE\`"
            echo "- Target readiness: \`$readiness_status\`"
            echo "- Blocking reasons: \`$readiness_reasons\`"
            echo '- Provider validation level: `ProviderNoRbac`'
            echo '- Azure authentication authorized: `true` for this read-only planning run'
            echo '- Credential creation authorized: `false`; no credential is created'
            echo '- Azure mutations authorized: `false`'
            echo '- Deployment authorized: `false`'
            echo '- No manually entered commit SHA is accepted by this workflow.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scoped planning evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: servicetracer-demo-api-subproject-plan-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 30
