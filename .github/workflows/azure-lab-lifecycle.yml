name: Azure lab lifecycle

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Bounded Azure operation'
        required: true
        type: choice
        options: [what-if, deploy, verify, teardown]
      environment:
        description: 'Lab environment'
        required: true
        default: dev
        type: choice
        options: [dev, test]
      resource_group:
        description: 'Dedicated ServiceTracer resource group'
        required: true
        default: servicetracer-dev-westus2
        type: string
      location:
        description: 'Azure region'
        required: true
        default: westus2
        type: string
      prefix:
        description: 'Bicep resource-name prefix'
        required: true
        default: mst
        type: string
      deploy_demo_backends:
        description: 'Deploy VPN-01 and VPN-02 behind the public load balancer'
        required: true
        default: false
        type: boolean
      demo_backend_vm_size:
        description: 'VM size for each simulated VPN backend, or auto for bounded Azure validation'
        required: true
        default: auto
        type: string
      deploy_public_report_endpoint:
        description: 'Deploy the sanitized Azure Storage report endpoint'
        required: true
        default: false
        type: boolean
      collector_source_ref:
        description: 'Optional tested commit SHA; blank uses the workflow commit'
        required: false
        type: string
      collector_vm_size:
        description: 'Collector VM size, or auto for bounded Azure validation'
        required: true
        default: auto
        type: string
      expected_private_ip:
        description: 'Expected private collector address'
        required: true
        default: 10.20.40.10
        type: string
      collector_port:
        description: 'Private collector HTTPS port'
        required: true
        default: '8080'
        type: string
      confirm_teardown:
        description: 'For teardown only, enter the exact resource-group name'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-servicetracer-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AZURE_CORE_ONLY_SHOW_ERRORS: 'true'
  ARTIFACT_DIR: azure-lifecycle-evidence

jobs:
  lifecycle:
    name: ${{ inputs.operation }} ServiceTracer Azure lab
    runs-on: ubuntu-latest
    environment: azure-lab
    timeout-minutes: 90
    steps:
      - name: Check out trusted repository state
        uses: actions/checkout@v4

      - name: Validate requested operation
        env:
          OPERATION: ${{ inputs.operation }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          DEPLOY_DEMO_BACKENDS: ${{ inputs.deploy_demo_backends }}
          DEMO_BACKEND_VM_SIZE: ${{ inputs.demo_backend_vm_size }}
          DEPLOY_PUBLIC_REPORT_ENDPOINT: ${{ inputs.deploy_public_report_endpoint }}
          SOURCE_REF: ${{ inputs.collector_source_ref }}
          COLLECTOR_VM_SIZE: ${{ inputs.collector_vm_size }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
          CONFIRM_TEARDOWN: ${{ inputs.confirm_teardown }}
          COLLECTOR_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.COLLECTOR_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          [[ "$LAB_ENVIRONMENT" =~ ^(dev|test)$ ]]
          [[ "$PREFIX" =~ ^[a-z0-9]{2,12}$ ]]
          [[ "$RESOURCE_GROUP" =~ ^(rg-)?servicetracer-(dev|test)(-[a-z0-9-]+)?$ ]]
          [[ "$LOCATION" =~ ^[a-z0-9]+$ ]]
          [[ "$DEPLOY_DEMO_BACKENDS" =~ ^(true|false)$ ]]
          [[ "$DEPLOY_PUBLIC_REPORT_ENDPOINT" =~ ^(true|false)$ ]]
          [[ "$DEMO_BACKEND_VM_SIZE" == 'auto' || "$DEMO_BACKEND_VM_SIZE" =~ ^Standard_[A-Za-z0-9_]+$ ]]
          [[ "$COLLECTOR_VM_SIZE" == 'auto' || "$COLLECTOR_VM_SIZE" =~ ^Standard_[A-Za-z0-9_]+$ ]]
          [[ "$EXPECTED_PRIVATE_IP" =~ ^10\.20\.40\.[0-9]{1,3}$ ]]
          [[ "$COLLECTOR_PORT" =~ ^[0-9]+$ ]]
          ((COLLECTOR_PORT >= 1 && COLLECTOR_PORT <= 65535))

          if [[ "$OPERATION" == 'what-if' || "$OPERATION" == 'deploy' ]]; then
            if [[ -n "$SOURCE_REF" ]]; then
              [[ "$SOURCE_REF" =~ ^[0-9a-fA-F]{40}$ ]] || {
                echo 'collector_source_ref must be a 40-character commit SHA when supplied.' >&2
                exit 1
              }
            fi
            [[ "$COLLECTOR_ADMIN_SSH_PUBLIC_KEY" == ssh-* ]] || {
              echo 'The azure-lab environment must provide COLLECTOR_ADMIN_SSH_PUBLIC_KEY.' >&2
              exit 1
            }
          fi

          if [[ "$OPERATION" == 'teardown' ]]; then
            [[ "$CONFIRM_TEARDOWN" == "$RESOURCE_GROUP" ]] || {
              echo 'Teardown confirmation must exactly match the resource-group name.' >&2
              exit 1
            }
          fi

          jq -n \
            --arg operation "$OPERATION" \
            --arg environment "$LAB_ENVIRONMENT" \
            --arg resourceGroup "$RESOURCE_GROUP" \
            --arg location "$LOCATION" \
            --arg prefix "$PREFIX" \
            --argjson deployDemoBackends "$DEPLOY_DEMO_BACKENDS" \
            --arg requestedDemoBackendVmSize "$DEMO_BACKEND_VM_SIZE" \
            --argjson deployPublicReportEndpoint "$DEPLOY_PUBLIC_REPORT_ENDPOINT" \
            --arg requestedSourceRef "$SOURCE_REF" \
            --arg requestedCollectorVmSize "$COLLECTOR_VM_SIZE" \
            --arg expectedPrivateIp "$EXPECTED_PRIVATE_IP" \
            --arg collectorPort "$COLLECTOR_PORT" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            '{requested_operation:$operation,environment:$environment,resource_group:$resourceGroup,location:$location,prefix:$prefix,deploy_demo_backends:$deployDemoBackends,requested_demo_backend_vm_size:$requestedDemoBackendVmSize,deploy_public_report_endpoint:$deployPublicReportEndpoint,requested_collector_source_ref:(if $requestedSourceRef=="" then null else $requestedSourceRef end),requested_collector_vm_size:$requestedCollectorVmSize,expected_private_ip:$expectedPrivateIp,collector_port:($collectorPort|tonumber),github_run_id:$runId,github_run_attempt:$runAttempt}' \
            > "$ARTIFACT_DIR/request.json"

      - name: Log in to Azure with workload identity federation
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Record Azure execution context
        run: |
          set -euo pipefail
          az account show --query '{subscriptionId:id,subscriptionName:name,tenantId:tenantId,user:user}' --output json > "$ARTIFACT_DIR/azure-context.json"

      - name: Ensure dedicated resource group exists
        if: inputs.operation == 'what-if' || inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
        run: |
          set -euo pipefail
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --tags workload=azure-iac-msp-lab purpose=servicetracer-demo managedBy=github-actions --output json > "$ARTIFACT_DIR/resource-group.json"

      - name: Select VM sizes and run Bicep what-if
        id: plan
        if: inputs.operation == 'what-if' || inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_DEMO_BACKENDS: ${{ inputs.deploy_demo_backends }}
          REQUESTED_DEMO_BACKEND_VM_SIZE: ${{ inputs.demo_backend_vm_size }}
          DEPLOY_PUBLIC_REPORT_ENDPOINT: ${{ inputs.deploy_public_report_endpoint }}
          REQUESTED_SOURCE_REF: ${{ inputs.collector_source_ref }}
          REQUESTED_COLLECTOR_VM_SIZE: ${{ inputs.collector_vm_size }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
          COLLECTOR_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.COLLECTOR_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          source_ref="${REQUESTED_SOURCE_REF:-$GITHUB_SHA}"
          [[ "$source_ref" =~ ^[0-9a-fA-F]{40}$ ]]

          if [[ "$REQUESTED_DEMO_BACKEND_VM_SIZE" == 'auto' ]]; then
            backend_pool=(
              Standard_B1ms
              Standard_B2ms
              Standard_D2as_v5
              Standard_D2s_v5
            )
          else
            backend_pool=("$REQUESTED_DEMO_BACKEND_VM_SIZE")
          fi

          if [[ "$REQUESTED_COLLECTOR_VM_SIZE" == 'auto' ]]; then
            collector_pool=(
              Standard_B1ms
              Standard_B2ms
              Standard_D2as_v5
              Standard_D2s_v5
            )
          else
            collector_pool=("$REQUESTED_COLLECTOR_VM_SIZE")
          fi

          sku_exists_without_reported_restriction() {
            local sku="$1"
            local result
            result="$(az vm list-skus \
              --location "$LOCATION" \
              --resource-type virtualMachines \
              --all \
              --query "[?name=='${sku}'] | [0].{name:name,restrictions:restrictions}" \
              --output json)"
            [[ "$(jq -r '.name // empty' <<<"$result")" == "$sku" ]] || return 1
            [[ "$(jq '.restrictions | length' <<<"$result")" -eq 0 ]]
          }

          filter_candidates() {
            local -n requested_pool="$1"
            local -n available_pool="$2"
            local sku
            for sku in "${requested_pool[@]}"; do
              if sku_exists_without_reported_restriction "$sku"; then
                available_pool+=("$sku")
              fi
            done
          }

          backend_candidates=()
          collector_candidates=()
          filter_candidates backend_pool backend_candidates
          filter_candidates collector_pool collector_candidates

          ((${#backend_candidates[@]} > 0)) || {
            echo 'No requested backend VM SKU is listed as unrestricted for this subscription and region.' >&2
            exit 1
          }
          ((${#collector_candidates[@]} > 0)) || {
            echo 'No requested collector VM SKU is listed as unrestricted for this subscription and region.' >&2
            exit 1
          }

          : > "$ARTIFACT_DIR/sku-validation-attempts.jsonl"
          selected_backend=''
          selected_collector=''

          for collector_size in "${collector_candidates[@]}"; do
            for backend_size in "${backend_candidates[@]}"; do
              validation_output="$ARTIFACT_DIR/deployment-validation-${collector_size}-${backend_size}.json"
              validation_error="$ARTIFACT_DIR/deployment-validation-${collector_size}-${backend_size}.stderr"
              common_parameters=(
                prefix="$PREFIX"
                environment="$LAB_ENVIRONMENT"
                location="$LOCATION"
                deployDemoBackends="$DEPLOY_DEMO_BACKENDS"
                demoBackendVmSize="$backend_size"
                deployOperationsCollector=true
                deployPublicReportEndpoint="$DEPLOY_PUBLIC_REPORT_ENDPOINT"
                collectorVmSize="$collector_size"
                collectorPrivateIpAddress="$EXPECTED_PRIVATE_IP"
                collectorPort="$COLLECTOR_PORT"
                collectorAdminSshPublicKey="$COLLECTOR_ADMIN_SSH_PUBLIC_KEY"
                collectorSourceRef="$source_ref"
              )

              if az deployment group validate \
                --resource-group "$RESOURCE_GROUP" \
                --template-file infra/main.bicep \
                --parameters "${common_parameters[@]}" \
                --output json > "$validation_output" 2> "$validation_error"; then
                selected_backend="$backend_size"
                selected_collector="$collector_size"
                cp "$validation_output" "$ARTIFACT_DIR/deployment-validation.json"
                jq -n \
                  --arg collector "$collector_size" \
                  --arg backend "$backend_size" \
                  --arg status succeeded \
                  '{collector_vm_size:$collector,demo_backend_vm_size:$backend,status:$status}' \
                  >> "$ARTIFACT_DIR/sku-validation-attempts.jsonl"
                break 2
              fi

              error_text="$(cat "$validation_error")"
              jq -n \
                --arg collector "$collector_size" \
                --arg backend "$backend_size" \
                --arg status rejected \
                --arg error "$error_text" \
                '{collector_vm_size:$collector,demo_backend_vm_size:$backend,status:$status,error:$error}' \
                >> "$ARTIFACT_DIR/sku-validation-attempts.jsonl"

              if ! grep -Eqi 'SkuNotAvailable|AllocationFailed|OverconstrainedAllocationRequest|ZonalAllocationFailed|capacity restriction|currently not available' "$validation_error"; then
                cat "$validation_error" >&2
                echo 'Validation failed for a reason other than VM capacity; refusing to hide the error behind SKU fallback.' >&2
                exit 1
              fi
            done
          done

          [[ -n "$selected_backend" && -n "$selected_collector" ]] || {
            echo 'Azure rejected every bounded VM-size combination for this subscription and region.' >&2
            cat "$ARTIFACT_DIR/sku-validation-attempts.jsonl" >&2
            exit 1
          }

          selected_parameters=(
            prefix="$PREFIX"
            environment="$LAB_ENVIRONMENT"
            location="$LOCATION"
            deployDemoBackends="$DEPLOY_DEMO_BACKENDS"
            demoBackendVmSize="$selected_backend"
            deployOperationsCollector=true
            deployPublicReportEndpoint="$DEPLOY_PUBLIC_REPORT_ENDPOINT"
            collectorVmSize="$selected_collector"
            collectorPrivateIpAddress="$EXPECTED_PRIVATE_IP"
            collectorPort="$COLLECTOR_PORT"
            collectorAdminSshPublicKey="$COLLECTOR_ADMIN_SSH_PUBLIC_KEY"
            collectorSourceRef="$source_ref"
          )

          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --name "servicetracer-${LAB_ENVIRONMENT}" \
            --template-file infra/main.bicep \
            --parameters "${selected_parameters[@]}" \
            --no-pretty-print \
            --output json > "$ARTIFACT_DIR/what-if.json"

          printf 'demo_backend_vm_size=%s\n' "$selected_backend" >> "$GITHUB_OUTPUT"
          printf 'collector_vm_size=%s\n' "$selected_collector" >> "$GITHUB_OUTPUT"
          printf 'collector_source_ref=%s\n' "$source_ref" >> "$GITHUB_OUTPUT"

          jq -n \
            --arg sourceRef "$source_ref" \
            --arg collectorVmSize "$selected_collector" \
            --arg demoBackendVmSize "$selected_backend" \
            '{collector_source_ref:$sourceRef,collector_vm_size:$collectorVmSize,demo_backend_vm_size:$demoBackendVmSize}' \
            > "$ARTIFACT_DIR/resolved-deployment-plan.json"

      - name: Deploy ServiceTracer infrastructure
        if: inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_DEMO_BACKENDS: ${{ inputs.deploy_demo_backends }}
          DEMO_BACKEND_VM_SIZE: ${{ steps.plan.outputs.demo_backend_vm_size }}
          DEPLOY_PUBLIC_REPORT_ENDPOINT: ${{ inputs.deploy_public_report_endpoint }}
          SOURCE_REF: ${{ steps.plan.outputs.collector_source_ref }}
          COLLECTOR_VM_SIZE: ${{ steps.plan.outputs.collector_vm_size }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
          COLLECTOR_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.COLLECTOR_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "servicetracer-${LAB_ENVIRONMENT}" \
            --template-file infra/main.bicep \
            --parameters prefix="$PREFIX" environment="$LAB_ENVIRONMENT" location="$LOCATION" deployDemoBackends="$DEPLOY_DEMO_BACKENDS" demoBackendVmSize="$DEMO_BACKEND_VM_SIZE" deployOperationsCollector=true deployPublicReportEndpoint="$DEPLOY_PUBLIC_REPORT_ENDPOINT" collectorVmSize="$COLLECTOR_VM_SIZE" collectorPrivateIpAddress="$EXPECTED_PRIVATE_IP" collectorPort="$COLLECTOR_PORT" collectorAdminSshPublicKey="$COLLECTOR_ADMIN_SSH_PUBLIC_KEY" collectorSourceRef="$SOURCE_REF" \
            --output json > "$ARTIFACT_DIR/deployment-result.json"

      - name: Verify Azure and guest collector behavior
        if: inputs.operation == 'deploy' || inputs.operation == 'verify'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
        run: |
          set -euo pipefail
          chmod +x infra/scripts/verify_collector_deployment.sh
          infra/scripts/verify_collector_deployment.sh \
            --resource-group "$RESOURCE_GROUP" \
            --prefix "$PREFIX" \
            --environment "$LAB_ENVIRONMENT" \
            --expected-private-ip "$EXPECTED_PRIVATE_IP" \
            --collector-port "$COLLECTOR_PORT" \
            --verification-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --output "$ARTIFACT_DIR/collector-verification.json"

      - name: Verify demo backend inventory
        if: (inputs.operation == 'deploy' || inputs.operation == 'verify') && inputs.deploy_demo_backends
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          for backend in vpn01 vpn02; do
            vm_name="vm-${backend}-${PREFIX}-${LAB_ENVIRONMENT}"
            az vm show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$vm_name" \
              --show-details \
              --query '{name:name,provisioningState:provisioningState,powerState:powerState,privateIps:privateIps}' \
              --output json
          done | jq -s '.' > "$ARTIFACT_DIR/demo-backend-inventory.json"
          jq -e 'length == 2 and all(.[]; .provisioningState == "Succeeded" and .powerState == "VM running")' "$ARTIFACT_DIR/demo-backend-inventory.json" > /dev/null

      - name: Capture pre-teardown inventory
        if: inputs.operation == 'teardown'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
        run: |
          set -euo pipefail
          az group show --name "$RESOURCE_GROUP" --output json > "$ARTIFACT_DIR/resource-group-before-teardown.json"
          az resource list --resource-group "$RESOURCE_GROUP" --output json > "$ARTIFACT_DIR/resources-before-teardown.json"

      - name: Delete dedicated ServiceTracer resource group
        if: inputs.operation == 'teardown'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
        run: |
          set -euo pipefail
          az group delete --name "$RESOURCE_GROUP" --yes
          if az group exists --name "$RESOURCE_GROUP" | grep -qx true; then
            echo 'Resource group still exists after deletion command.' >&2
            exit 1
          fi
          jq -n --arg resourceGroup "$RESOURCE_GROUP" --arg deletedAt "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" '{status:"deleted",resource_group:$resourceGroup,deleted_at:$deletedAt}' > "$ARTIFACT_DIR/teardown-result.json"

      - name: Write workflow summary
        if: always()
        env:
          OPERATION: ${{ inputs.operation }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          DEPLOY_DEMO_BACKENDS: ${{ inputs.deploy_demo_backends }}
          DEPLOY_PUBLIC_REPORT_ENDPOINT: ${{ inputs.deploy_public_report_endpoint }}
          RESOLVED_DEMO_BACKEND_VM_SIZE: ${{ steps.plan.outputs.demo_backend_vm_size }}
          RESOLVED_COLLECTOR_VM_SIZE: ${{ steps.plan.outputs.collector_vm_size }}
          RESOLVED_SOURCE_REF: ${{ steps.plan.outputs.collector_source_ref }}
        run: |
          {
            echo '## ServiceTracer Azure lifecycle'
            echo
            echo "- Operation: \`$OPERATION\`"
            echo "- Resource group: \`$RESOURCE_GROUP\`"
            echo "- Demo backends requested: \`$DEPLOY_DEMO_BACKENDS\`"
            echo "- Public report endpoint requested: \`$DEPLOY_PUBLIC_REPORT_ENDPOINT\`"
            if [[ -n "$RESOLVED_DEMO_BACKEND_VM_SIZE" ]]; then
              echo "- Resolved backend VM size: \`$RESOLVED_DEMO_BACKEND_VM_SIZE\`"
              echo "- Resolved collector VM size: \`$RESOLVED_COLLECTOR_VM_SIZE\`"
              echo "- Collector source commit: \`$RESOLVED_SOURCE_REF\`"
            fi
            echo "- Workflow conclusion: \`${{ job.status }}\`"
            echo '- Detailed non-secret evidence is attached as a workflow artifact.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-lifecycle-${{ inputs.operation }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 30
