name: Azure lab lifecycle

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Bounded Azure operation'
        required: true
        type: choice
        options: [what-if, deploy, verify, teardown]
      environment:
        description: 'Lab environment'
        required: true
        default: dev
        type: choice
        options: [dev, test]
      resource_group:
        description: 'Dedicated ServiceTracer resource group'
        required: true
        default: rg-servicetracer-dev
        type: string
      location:
        description: 'Azure region'
        required: true
        default: canadacentral
        type: string
      prefix:
        description: 'Bicep resource-name prefix'
        required: true
        default: mst
        type: string
      collector_source_ref:
        description: 'Tested 40-character commit SHA; required for what-if and deploy'
        required: false
        type: string
      expected_private_ip:
        description: 'Expected private collector address'
        required: true
        default: 10.20.40.10
        type: string
      collector_port:
        description: 'Private collector HTTPS port'
        required: true
        default: '8080'
        type: string
      confirm_teardown:
        description: 'For teardown only, enter the exact resource-group name'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-servicetracer-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AZURE_CORE_ONLY_SHOW_ERRORS: 'true'
  ARTIFACT_DIR: azure-lifecycle-evidence

jobs:
  lifecycle:
    name: ${{ inputs.operation }} ServiceTracer Azure lab
    runs-on: ubuntu-latest
    environment: azure-lab
    timeout-minutes: 90
    steps:
      - name: Check out trusted repository state
        uses: actions/checkout@v4

      - name: Validate requested operation
        env:
          OPERATION: ${{ inputs.operation }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          SOURCE_REF: ${{ inputs.collector_source_ref }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
          CONFIRM_TEARDOWN: ${{ inputs.confirm_teardown }}
          COLLECTOR_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.COLLECTOR_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          [[ "$LAB_ENVIRONMENT" =~ ^(dev|test)$ ]]
          [[ "$PREFIX" =~ ^[a-z0-9]{2,12}$ ]]
          [[ "$RESOURCE_GROUP" =~ ^rg-servicetracer-(dev|test)(-[a-z0-9-]+)?$ ]]
          [[ "$LOCATION" =~ ^[a-z0-9]+$ ]]
          [[ "$EXPECTED_PRIVATE_IP" =~ ^10\.20\.40\.[0-9]{1,3}$ ]]
          [[ "$COLLECTOR_PORT" =~ ^[0-9]+$ ]]
          ((COLLECTOR_PORT >= 1 && COLLECTOR_PORT <= 65535))

          if [[ "$OPERATION" == 'what-if' || "$OPERATION" == 'deploy' ]]; then
            [[ "$SOURCE_REF" =~ ^[0-9a-fA-F]{40}$ ]] || {
              echo 'what-if and deploy require a tested 40-character collector_source_ref.' >&2
              exit 1
            }
            [[ "$COLLECTOR_ADMIN_SSH_PUBLIC_KEY" == ssh-* ]] || {
              echo 'The azure-lab environment must provide COLLECTOR_ADMIN_SSH_PUBLIC_KEY.' >&2
              exit 1
            }
          fi

          if [[ "$OPERATION" == 'teardown' ]]; then
            [[ "$CONFIRM_TEARDOWN" == "$RESOURCE_GROUP" ]] || {
              echo 'Teardown confirmation must exactly match the resource-group name.' >&2
              exit 1
            }
          fi

          jq -n \
            --arg operation "$OPERATION" \
            --arg environment "$LAB_ENVIRONMENT" \
            --arg resourceGroup "$RESOURCE_GROUP" \
            --arg location "$LOCATION" \
            --arg prefix "$PREFIX" \
            --arg sourceRef "$SOURCE_REF" \
            --arg expectedPrivateIp "$EXPECTED_PRIVATE_IP" \
            --arg collectorPort "$COLLECTOR_PORT" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            '{requested_operation:$operation,environment:$environment,resource_group:$resourceGroup,location:$location,prefix:$prefix,collector_source_ref:(if $sourceRef=="" then null else $sourceRef end),expected_private_ip:$expectedPrivateIp,collector_port:($collectorPort|tonumber),github_run_id:$runId,github_run_attempt:$runAttempt}' \
            > "$ARTIFACT_DIR/request.json"

      - name: Log in to Azure with workload identity federation
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Record Azure execution context
        run: |
          set -euo pipefail
          az account show --query '{subscriptionId:id,subscriptionName:name,tenantId:tenantId,user:user}' --output json > "$ARTIFACT_DIR/azure-context.json"

      - name: Ensure dedicated resource group exists
        if: inputs.operation == 'what-if' || inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
        run: |
          set -euo pipefail
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --tags workload=azure-iac-msp-lab purpose=servicetracer-demo managedBy=github-actions --output json > "$ARTIFACT_DIR/resource-group.json"

      - name: Run Bicep validation and what-if
        if: inputs.operation == 'what-if' || inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          SOURCE_REF: ${{ inputs.collector_source_ref }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
          COLLECTOR_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.COLLECTOR_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          common_parameters=(prefix="$PREFIX" environment="$LAB_ENVIRONMENT" location="$LOCATION" deployOperationsCollector=true collectorPrivateIpAddress="$EXPECTED_PRIVATE_IP" collectorPort="$COLLECTOR_PORT" collectorAdminSshPublicKey="$COLLECTOR_ADMIN_SSH_PUBLIC_KEY" collectorSourceRef="$SOURCE_REF")
          az deployment group validate --resource-group "$RESOURCE_GROUP" --template-file infra/main.bicep --parameters "${common_parameters[@]}" --output json > "$ARTIFACT_DIR/deployment-validation.json"
          az deployment group what-if --resource-group "$RESOURCE_GROUP" --name "servicetracer-${LAB_ENVIRONMENT}" --template-file infra/main.bicep --parameters "${common_parameters[@]}" --no-pretty-print --output json > "$ARTIFACT_DIR/what-if.json"

      - name: Deploy collector infrastructure
        if: inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          SOURCE_REF: ${{ inputs.collector_source_ref }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
          COLLECTOR_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.COLLECTOR_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "servicetracer-${LAB_ENVIRONMENT}" \
            --template-file infra/main.bicep \
            --parameters prefix="$PREFIX" environment="$LAB_ENVIRONMENT" location="$LOCATION" deployOperationsCollector=true collectorPrivateIpAddress="$EXPECTED_PRIVATE_IP" collectorPort="$COLLECTOR_PORT" collectorAdminSshPublicKey="$COLLECTOR_ADMIN_SSH_PUBLIC_KEY" collectorSourceRef="$SOURCE_REF" \
            --output json > "$ARTIFACT_DIR/deployment-result.json"

      - name: Verify Azure and guest collector behavior
        if: inputs.operation == 'deploy' || inputs.operation == 'verify'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          EXPECTED_PRIVATE_IP: ${{ inputs.expected_private_ip }}
          COLLECTOR_PORT: ${{ inputs.collector_port }}
        run: |
          set -euo pipefail
          chmod +x infra/scripts/verify_collector_deployment.sh
          infra/scripts/verify_collector_deployment.sh \
            --resource-group "$RESOURCE_GROUP" \
            --prefix "$PREFIX" \
            --environment "$LAB_ENVIRONMENT" \
            --expected-private-ip "$EXPECTED_PRIVATE_IP" \
            --collector-port "$COLLECTOR_PORT" \
            --verification-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --output "$ARTIFACT_DIR/collector-verification.json"

      - name: Capture pre-teardown inventory
        if: inputs.operation == 'teardown'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
        run: |
          set -euo pipefail
          az group show --name "$RESOURCE_GROUP" --output json > "$ARTIFACT_DIR/resource-group-before-teardown.json"
          az resource list --resource-group "$RESOURCE_GROUP" --output json > "$ARTIFACT_DIR/resources-before-teardown.json"

      - name: Delete dedicated ServiceTracer resource group
        if: inputs.operation == 'teardown'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
        run: |
          set -euo pipefail
          az group delete --name "$RESOURCE_GROUP" --yes
          if az group exists --name "$RESOURCE_GROUP" | grep -qx true; then
            echo 'Resource group still exists after deletion command.' >&2
            exit 1
          fi
          jq -n --arg resourceGroup "$RESOURCE_GROUP" --arg deletedAt "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" '{status:"deleted",resource_group:$resourceGroup,deleted_at:$deletedAt}' > "$ARTIFACT_DIR/teardown-result.json"

      - name: Write workflow summary
        if: always()
        env:
          OPERATION: ${{ inputs.operation }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
        run: |
          {
            echo '## ServiceTracer Azure lifecycle'
            echo
            echo "- Operation: \`$OPERATION\`"
            echo "- Resource group: \`$RESOURCE_GROUP\`"
            echo "- Workflow conclusion: \`${{ job.status }}\`"
            echo '- Detailed non-secret evidence is attached as a workflow artifact.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-lifecycle-${{ inputs.operation }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 30
