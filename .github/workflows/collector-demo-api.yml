name: Collector-hosted demo API

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Bounded collector-hosted demo API operation'
        required: true
        type: choice
        options: [what-if, deploy, verify]
      reviewed_commit:
        description: 'Exact reviewed commit containing this workflow and installer'
        required: true
        type: string
      environment:
        description: 'Lab environment'
        required: true
        default: dev
        type: choice
        options: [dev, test]
      resource_group:
        description: 'Existing ServiceTracer resource group'
        required: true
        default: rg-servicetracer-dev-westus2
        type: string
      location:
        description: 'Expected Azure region'
        required: true
        default: westus2
        type: string
      prefix:
        description: 'Bicep resource-name prefix'
        required: true
        default: mst
        type: string
      dns_label:
        description: 'Globally unique Azure public-IP DNS label'
        required: true
        default: st-demo-api-aeg30000
        type: string
      allowed_origin:
        description: 'Exact browser origin allowed by CORS'
        required: true
        default: https://anthonyedgar30000.github.io
        type: string
      confirmation:
        description: 'Enter COLLECTOR-DEMO-API:<operation>:<resource-group>:<dns-label>'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: collector-demo-api-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AZURE_CORE_ONLY_SHOW_ERRORS: 'true'
  ARTIFACT_DIR: collector-demo-api-evidence

jobs:
  collector-demo-api:
    name: ${{ inputs.operation }} collector-hosted demo API
    runs-on: ubuntu-latest
    environment: azure-lab
    timeout-minutes: 90
    steps:
      - name: Check out exact reviewed repository state
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.reviewed_commit }}

      - name: Validate bounded scope and authority
        env:
          OPERATION: ${{ inputs.operation }}
          REVIEWED_COMMIT: ${{ inputs.reviewed_commit }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          DNS_LABEL: ${{ inputs.dns_label }}
          ALLOWED_ORIGIN: ${{ inputs.allowed_origin }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          [[ "$OPERATION" =~ ^(what-if|deploy|verify)$ ]]
          [[ "$REVIEWED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$(git rev-parse HEAD)" == "$REVIEWED_COMMIT" ]]
          [[ "$LAB_ENVIRONMENT" =~ ^(dev|test)$ ]]
          [[ "$RESOURCE_GROUP" =~ ^rg-servicetracer-(dev|test)(-[a-z0-9-]+)?$ ]]
          [[ "$LOCATION" =~ ^[a-z0-9]+$ ]]
          [[ "$PREFIX" =~ ^[a-z0-9]{2,12}$ ]]
          [[ "$DNS_LABEL" =~ ^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$ ]]
          [[ "$ALLOWED_ORIGIN" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?$ ]]
          expected="COLLECTOR-DEMO-API:${OPERATION}:${RESOURCE_GROUP}:${DNS_LABEL}"
          [[ "$CONFIRMATION" == "$expected" ]] || {
            echo "Confirmation must exactly equal: $expected" >&2
            exit 1
          }
          jq -n \
            --arg operation "$OPERATION" \
            --arg reviewed_commit "$REVIEWED_COMMIT" \
            --arg resource_group "$RESOURCE_GROUP" \
            --arg location "$LOCATION" \
            --arg environment "$LAB_ENVIRONMENT" \
            --arg prefix "$PREFIX" \
            --arg dns_label "$DNS_LABEL" \
            --arg allowed_origin "$ALLOWED_ORIGIN" \
            '{schema_version:"servicetracer.collector-demo-api-request.v2",operation:$operation,reviewed_commit:$reviewed_commit,resource_group:$resource_group,location:$location,environment:$environment,prefix:$prefix,dns_label:$dns_label,allowed_origin:$allowed_origin,azure_authentication_authorized:true,azure_mutations_authorized:($operation=="deploy"),collector_configuration_mutation_authorized:($operation=="deploy"),base_infrastructure_mutation_authorized:false,microsoft_web_authorized:false}' \
            > "$ARTIFACT_DIR/request.json"

      - name: Run repository tests before Azure login
        run: |
          set -euo pipefail
          python -m unittest \
            infra.tests.test_demo_backend_api \
            infra.tests.test_collector_demo_api \
            infra.tests.test_collector_demo_api_load_balancer \
            infra.tests.test_collector_demo_api_readiness \
            -v

      - name: Log in to Azure with workload identity federation
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture current collector and dependency state
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          suffix="${PREFIX}-${LAB_ENVIRONMENT}"
          capture_json() {
            local output="$1"
            shift
            if "$@" --output json > "$output" 2>/dev/null; then
              return 0
            fi
            jq -n '{status:"not_present"}' > "$output"
          }
          status_of() {
            jq -r 'if .status=="not_present" then "not_present" else "observed_existing" end' "$1"
          }

          az account show --query '{subscriptionId:id,subscriptionName:name,tenantId:tenantId,user:user}' --output json > "$ARTIFACT_DIR/azure-context.json"
          az group show --name "$RESOURCE_GROUP" --output json > "$ARTIFACT_DIR/resource-group.json"
          [[ "$(jq -r '.location' "$ARTIFACT_DIR/resource-group.json")" == "$LOCATION" ]]
          [[ "$(jq -r '.tags.workload // empty' "$ARTIFACT_DIR/resource-group.json")" == 'azure-iac-msp-lab' ]]

          az vm show --resource-group "$RESOURCE_GROUP" --name "vm-stcollector-${suffix}" --show-details --output json > "$ARTIFACT_DIR/collector-vm.json"
          jq -e '.provisioningState=="Succeeded"' "$ARTIFACT_DIR/collector-vm.json" > /dev/null
          az network nic show --resource-group "$RESOURCE_GROUP" --name "nic-stcollector-${suffix}" --output json > "$ARTIFACT_DIR/collector-nic.json"
          az network nsg show --resource-group "$RESOURCE_GROUP" --name "nsg-operations-${suffix}" --output json > "$ARTIFACT_DIR/operations-nsg.json"
          az network lb show --resource-group "$RESOURCE_GROUP" --name "lb-remote-access-${suffix}" --output json > "$ARTIFACT_DIR/edge-load-balancer.json"
          az network public-ip show --resource-group "$RESOURCE_GROUP" --name "pip-remote-access-${suffix}" --output json > "$ARTIFACT_DIR/remote-access-public-ip.json"
          az deployment group show --resource-group "$RESOURCE_GROUP" --name "operations-collector-${LAB_ENVIRONMENT}" --output json > "$ARTIFACT_DIR/collector-module-deployment.json"

          jq -e --arg vm "/virtualMachines/vm-stcollector-${suffix}" '.virtualMachine.id | endswith($vm)' "$ARTIFACT_DIR/collector-nic.json" > /dev/null
          jq -e --arg lb "/loadBalancers/lb-remote-access-${suffix}/frontendIPConfigurations/" '.ipConfiguration.id | contains($lb)' "$ARTIFACT_DIR/remote-access-public-ip.json" > /dev/null
          jq -e '.ipAddress != null and .ipAddress != "" and .provisioningState=="Succeeded"' "$ARTIFACT_DIR/remote-access-public-ip.json" > /dev/null

          capture_json "$ARTIFACT_DIR/existing-demo-api-public-ip.json" \
            az network public-ip show --resource-group "$RESOURCE_GROUP" --name "pip-st-demo-api-${suffix}"
          capture_json "$ARTIFACT_DIR/existing-demo-api-load-balancer.json" \
            az network lb show --resource-group "$RESOURCE_GROUP" --name "lb-st-demo-api-${suffix}"
          capture_json "$ARTIFACT_DIR/existing-demo-api-http-nsg-rule.json" \
            az network nsg rule show --resource-group "$RESOURCE_GROUP" --nsg-name "nsg-operations-${suffix}" --name Allow-Demo-API-HTTP-From-Internet
          capture_json "$ARTIFACT_DIR/existing-demo-api-https-nsg-rule.json" \
            az network nsg rule show --resource-group "$RESOURCE_GROUP" --nsg-name "nsg-operations-${suffix}" --name Allow-Demo-API-HTTPS-From-Internet
          capture_json "$ARTIFACT_DIR/existing-demo-api-vm-extension.json" \
            az vm extension show --resource-group "$RESOURCE_GROUP" --vm-name "vm-stcollector-${suffix}" --name servicetracer-demo-api

          capture_json "$ARTIFACT_DIR/legacy-demo-api-lb-frontend.json" \
            az network lb frontend-ip show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name fe-public-st-demo-api
          capture_json "$ARTIFACT_DIR/legacy-demo-api-lb-backend-pool.json" \
            az network lb address-pool show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name be-st-demo-api
          capture_json "$ARTIFACT_DIR/legacy-demo-api-lb-probe.json" \
            az network lb probe show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name probe-tcp-80-st-demo-api
          capture_json "$ARTIFACT_DIR/legacy-demo-api-lb-http-rule.json" \
            az network lb rule show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name rule-st-demo-api-http
          capture_json "$ARTIFACT_DIR/legacy-demo-api-lb-https-rule.json" \
            az network lb rule show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name rule-st-demo-api-https

          public_ip_status="$(status_of "$ARTIFACT_DIR/existing-demo-api-public-ip.json")"
          jq -n --arg status "$public_ip_status" '{status:$status}' > "$ARTIFACT_DIR/demo-api-public-ip-state.json"

          jq -n \
            --arg frontend "$(status_of "$ARTIFACT_DIR/legacy-demo-api-lb-frontend.json")" \
            --arg backend_pool "$(status_of "$ARTIFACT_DIR/legacy-demo-api-lb-backend-pool.json")" \
            --arg probe "$(status_of "$ARTIFACT_DIR/legacy-demo-api-lb-probe.json")" \
            --arg http_rule "$(status_of "$ARTIFACT_DIR/legacy-demo-api-lb-http-rule.json")" \
            --arg https_rule "$(status_of "$ARTIFACT_DIR/legacy-demo-api-lb-https-rule.json")" \
            --arg public_ip "$public_ip_status" \
            --arg load_balancer "$(status_of "$ARTIFACT_DIR/existing-demo-api-load-balancer.json")" \
            --arg http_nsg_rule "$(status_of "$ARTIFACT_DIR/existing-demo-api-http-nsg-rule.json")" \
            --arg https_nsg_rule "$(status_of "$ARTIFACT_DIR/existing-demo-api-https-nsg-rule.json")" \
            --arg vm_extension "$(status_of "$ARTIFACT_DIR/existing-demo-api-vm-extension.json")" \
            '{schema_version:"servicetracer.collector-demo-api-ingress-state.v1",legacy_remote_load_balancer_children:{frontend:$frontend,backend_pool:$backend_pool,probe:$probe,http_rule:$http_rule,https_rule:$https_rule},dedicated_target_resources:{public_ip:$public_ip,load_balancer:$load_balancer,http_nsg_rule:$http_nsg_rule,https_nsg_rule:$https_nsg_rule,vm_extension:$vm_extension}}' \
            > "$ARTIFACT_DIR/collector-demo-api-ingress-state.json"

          az network list-usages --location "$LOCATION" --output json > "$ARTIFACT_DIR/network-usage.json"
          az lock list --resource-group "$RESOURCE_GROUP" --output json > "$ARTIFACT_DIR/resource-locks.json"
          az resource list --resource-group "$RESOURCE_GROUP" \
            --query "[?contains(name, 'demo-api') || starts_with(type, 'Microsoft.Web/') || type=='Microsoft.Insights/components'].{name:name,type:type,id:id,location:location,tags:tags}" \
            --output json > "$ARTIFACT_DIR/prior-demo-api-resources.json"

      - name: Enforce collector-hosted deployment readiness
        if: inputs.operation == 'what-if' || inputs.operation == 'deploy'
        env:
          DNS_LABEL: ${{ inputs.dns_label }}
          LOCATION: ${{ inputs.location }}
        run: |
          set -euo pipefail
          python infra/scripts/assess_collector_demo_api_readiness.py \
            --collector-vm "$ARTIFACT_DIR/collector-vm.json" \
            --collector-nic "$ARTIFACT_DIR/collector-nic.json" \
            --collector-module-deployment "$ARTIFACT_DIR/collector-module-deployment.json" \
            --network-usage "$ARTIFACT_DIR/network-usage.json" \
            --resource-locks "$ARTIFACT_DIR/resource-locks.json" \
            --demo-api-public-ip-state "$ARTIFACT_DIR/demo-api-public-ip-state.json" \
            --prior-demo-api-resources "$ARTIFACT_DIR/prior-demo-api-resources.json" \
            --ingress-state "$ARTIFACT_DIR/collector-demo-api-ingress-state.json" \
            --dns-label "$DNS_LABEL" \
            --location "$LOCATION" \
            --expected-private-ip '10.20.40.10' \
            --output "$ARTIFACT_DIR/readiness-assessment.json"
          jq -e '.deployment_decision_ready==true and .public_ip_quota.sufficient==true' "$ARTIFACT_DIR/readiness-assessment.json" > /dev/null

      - name: Validate and capture exact ARM What-If
        if: inputs.operation == 'what-if' || inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          DNS_LABEL: ${{ inputs.dns_label }}
          ALLOWED_ORIGIN: ${{ inputs.allowed_origin }}
          REVIEWED_COMMIT: ${{ inputs.reviewed_commit }}
        run: |
          set -euo pipefail
          suffix="${PREFIX}-${LAB_ENVIRONMENT}"
          collector_private_ip="$(jq -r '.ipConfigurations[0].privateIPAddress' "$ARTIFACT_DIR/collector-nic.json")"
          collector_subnet_id="$(jq -r '.ipConfigurations[0].subnet.id' "$ARTIFACT_DIR/collector-nic.json")"
          virtual_network_id="${collector_subnet_id%/subnets/*}"
          collector_vm_name="$(jq -r '.name' "$ARTIFACT_DIR/collector-vm.json")"
          operations_nsg_name="$(jq -r '.name' "$ARTIFACT_DIR/operations-nsg.json")"
          remote_access_load_balancer_name="$(jq -r '.name' "$ARTIFACT_DIR/edge-load-balancer.json")"
          remote_access_ip="$(jq -r '.ipAddress' "$ARTIFACT_DIR/remote-access-public-ip.json")"
          collector_source_repository="$(jq -r '.properties.parameters.collectorSourceRepository.value' "$ARTIFACT_DIR/collector-module-deployment.json")"
          existing_collector_source_ref="$(jq -r '.properties.parameters.collectorSourceRef.value' "$ARTIFACT_DIR/collector-module-deployment.json")"
          backend_transaction_url="https://${remote_access_ip}/transaction"
          installer_uri="https://raw.githubusercontent.com/anthonyedgar30000/azure-iac-msp-lab/${REVIEWED_COMMIT}/infra/scripts/install_collector_demo_api.sh"

          [[ "$collector_vm_name" == "vm-stcollector-${suffix}" ]]
          [[ "$operations_nsg_name" == "nsg-operations-${suffix}" ]]
          [[ "$remote_access_load_balancer_name" == "lb-remote-access-${suffix}" ]]
          [[ "$virtual_network_id" == */virtualNetworks/vnet-onprem-sim-${suffix} ]]

          jq -n \
            --arg collector_private_ip "$collector_private_ip" \
            --arg virtual_network_id "$virtual_network_id" \
            --arg collector_vm_name "$collector_vm_name" \
            --arg operations_nsg_name "$operations_nsg_name" \
            --arg remote_access_load_balancer_name "$remote_access_load_balancer_name" \
            --arg backend_transaction_url "$backend_transaction_url" \
            --arg collector_source_repository "$collector_source_repository" \
            --arg existing_collector_source_ref "$existing_collector_source_ref" \
            --arg deployment_source_ref "$REVIEWED_COMMIT" \
            --arg installer_uri "$installer_uri" \
            '{collector_private_ip:$collector_private_ip,virtual_network_id:$virtual_network_id,collector_vm_name:$collector_vm_name,operations_nsg_name:$operations_nsg_name,remote_access_load_balancer_name:$remote_access_load_balancer_name,backend_transaction_url:$backend_transaction_url,collector_source_repository:$collector_source_repository,existing_collector_source_ref:$existing_collector_source_ref,deployment_source_ref:$deployment_source_ref,installer_uri:$installer_uri}' \
            > "$ARTIFACT_DIR/effective-collector-parameters.json"

          parameters=(
            prefix="$PREFIX"
            environment="$LAB_ENVIRONMENT"
            location="$LOCATION"
            virtualNetworkId="$virtual_network_id"
            operationsNsgName="$operations_nsg_name"
            collectorVmName="$collector_vm_name"
            collectorPrivateIpAddress="$collector_private_ip"
            dnsLabel="$DNS_LABEL"
            allowedOrigin="$ALLOWED_ORIGIN"
            backendTransactionUrl="$backend_transaction_url"
            sourceRepository="$collector_source_repository"
            sourceRef="$REVIEWED_COMMIT"
            installerUri="$installer_uri"
          )

          az deployment group validate \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/collector-demo-api.bicep \
            --parameters "${parameters[@]}" \
            --output json > "$ARTIFACT_DIR/arm-validation.json"

          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/collector-demo-api.bicep \
            --parameters "${parameters[@]}" \
            --result-format FullResourcePayloads \
            --no-pretty-print \
            --output json > "$ARTIFACT_DIR/arm-what-if.json"

          python infra/scripts/assert_collector_demo_api_what_if.py \
            --input "$ARTIFACT_DIR/arm-what-if.json" \
            --output "$ARTIFACT_DIR/what-if-assessment.json" \
            --suffix "$suffix" \
            --private-ip "$collector_private_ip" \
            --virtual-network-id "$virtual_network_id" \
            --dns-label "$DNS_LABEL"

      - name: Deploy collector-hosted demo API
        if: inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          DNS_LABEL: ${{ inputs.dns_label }}
          ALLOWED_ORIGIN: ${{ inputs.allowed_origin }}
        run: |
          set -euo pipefail
          collector_private_ip="$(jq -r '.collector_private_ip' "$ARTIFACT_DIR/effective-collector-parameters.json")"
          virtual_network_id="$(jq -r '.virtual_network_id' "$ARTIFACT_DIR/effective-collector-parameters.json")"
          collector_vm_name="$(jq -r '.collector_vm_name' "$ARTIFACT_DIR/effective-collector-parameters.json")"
          operations_nsg_name="$(jq -r '.operations_nsg_name' "$ARTIFACT_DIR/effective-collector-parameters.json")"
          backend_transaction_url="$(jq -r '.backend_transaction_url' "$ARTIFACT_DIR/effective-collector-parameters.json")"
          collector_source_repository="$(jq -r '.collector_source_repository' "$ARTIFACT_DIR/effective-collector-parameters.json")"
          deployment_source_ref="$(jq -r '.deployment_source_ref' "$ARTIFACT_DIR/effective-collector-parameters.json")"
          installer_uri="$(jq -r '.installer_uri' "$ARTIFACT_DIR/effective-collector-parameters.json")"

          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "collector-demo-api-${LAB_ENVIRONMENT}" \
            --template-file infra/collector-demo-api.bicep \
            --parameters \
              prefix="$PREFIX" \
              environment="$LAB_ENVIRONMENT" \
              location="$LOCATION" \
              virtualNetworkId="$virtual_network_id" \
              operationsNsgName="$operations_nsg_name" \
              collectorVmName="$collector_vm_name" \
              collectorPrivateIpAddress="$collector_private_ip" \
              dnsLabel="$DNS_LABEL" \
              allowedOrigin="$ALLOWED_ORIGIN" \
              backendTransactionUrl="$backend_transaction_url" \
              sourceRepository="$collector_source_repository" \
              sourceRef="$deployment_source_ref" \
              installerUri="$installer_uri" \
            --output json > "$ARTIFACT_DIR/deployment-result.json"

      - name: Capture post-deploy target state and ARM operations
        if: always() && inputs.operation == 'deploy'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          suffix="${PREFIX}-${LAB_ENVIRONMENT}"
          capture_json() {
            local output="$1"
            shift
            if "$@" --output json > "$output" 2>/dev/null; then
              return 0
            fi
            jq -n '{status:"not_present_or_not_observable"}' > "$output"
          }
          capture_json "$ARTIFACT_DIR/post-deploy-parent-deployment.json" \
            az deployment group show --resource-group "$RESOURCE_GROUP" --name "collector-demo-api-${LAB_ENVIRONMENT}"
          capture_json "$ARTIFACT_DIR/post-deploy-parent-operations.json" \
            az deployment operation group list --resource-group "$RESOURCE_GROUP" --name "collector-demo-api-${LAB_ENVIRONMENT}"
          capture_json "$ARTIFACT_DIR/post-deploy-nested-deployment.json" \
            az deployment group show --resource-group "$RESOURCE_GROUP" --name "collector-demo-api-resources-${LAB_ENVIRONMENT}"
          capture_json "$ARTIFACT_DIR/post-deploy-nested-operations.json" \
            az deployment operation group list --resource-group "$RESOURCE_GROUP" --name "collector-demo-api-resources-${LAB_ENVIRONMENT}"
          capture_json "$ARTIFACT_DIR/post-deploy-demo-api-public-ip.json" \
            az network public-ip show --resource-group "$RESOURCE_GROUP" --name "pip-st-demo-api-${suffix}"
          capture_json "$ARTIFACT_DIR/post-deploy-demo-api-load-balancer.json" \
            az network lb show --resource-group "$RESOURCE_GROUP" --name "lb-st-demo-api-${suffix}"
          capture_json "$ARTIFACT_DIR/post-deploy-demo-api-http-nsg-rule.json" \
            az network nsg rule show --resource-group "$RESOURCE_GROUP" --nsg-name "nsg-operations-${suffix}" --name Allow-Demo-API-HTTP-From-Internet
          capture_json "$ARTIFACT_DIR/post-deploy-demo-api-https-nsg-rule.json" \
            az network nsg rule show --resource-group "$RESOURCE_GROUP" --nsg-name "nsg-operations-${suffix}" --name Allow-Demo-API-HTTPS-From-Internet
          capture_json "$ARTIFACT_DIR/post-deploy-demo-api-vm-extension.json" \
            az vm extension show --resource-group "$RESOURCE_GROUP" --vm-name "vm-stcollector-${suffix}" --name servicetracer-demo-api
          capture_json "$ARTIFACT_DIR/post-deploy-legacy-lb-frontend.json" \
            az network lb frontend-ip show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name fe-public-st-demo-api
          capture_json "$ARTIFACT_DIR/post-deploy-legacy-lb-backend-pool.json" \
            az network lb address-pool show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name be-st-demo-api
          capture_json "$ARTIFACT_DIR/post-deploy-legacy-lb-probe.json" \
            az network lb probe show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name probe-tcp-80-st-demo-api
          capture_json "$ARTIFACT_DIR/post-deploy-legacy-lb-http-rule.json" \
            az network lb rule show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name rule-st-demo-api-http
          capture_json "$ARTIFACT_DIR/post-deploy-legacy-lb-https-rule.json" \
            az network lb rule show --resource-group "$RESOURCE_GROUP" --lb-name "lb-remote-access-${suffix}" --name rule-st-demo-api-https

      - name: Verify public TLS, API, and frontend contract
        if: inputs.operation == 'deploy' || inputs.operation == 'verify'
        env:
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          LOCATION: ${{ inputs.location }}
          PREFIX: ${{ inputs.prefix }}
          LAB_ENVIRONMENT: ${{ inputs.environment }}
          DNS_LABEL: ${{ inputs.dns_label }}
          ALLOWED_ORIGIN: ${{ inputs.allowed_origin }}
        run: |
          set -euo pipefail
          suffix="${PREFIX}-${LAB_ENVIRONMENT}"
          az network public-ip show --resource-group "$RESOURCE_GROUP" --name "pip-st-demo-api-${suffix}" --output json > "$ARTIFACT_DIR/demo-api-public-ip.json"
          fqdn="$(jq -r '.dnsSettings.fqdn' "$ARTIFACT_DIR/demo-api-public-ip.json")"
          [[ "$fqdn" == "${DNS_LABEL}.${LOCATION}.cloudapp.azure.com" ]]
          health_url="https://${fqdn}/api/health"
          run_url="https://${fqdn}/api/demo/run"

          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error "$health_url" > "$ARTIFACT_DIR/api-health.json"; then
              break
            fi
            sleep 10
          done
          jq -e '.status=="healthy" and .backend_target_configured==true and .hosting_model=="collector_vm_systemd"' "$ARTIFACT_DIR/api-health.json" > /dev/null

          curl --fail --silent --show-error \
            --request POST \
            --header 'Content-Type: application/json' \
            --header "Origin: ${ALLOWED_ORIGIN}" \
            --data '{"attempts":20}' \
            "$run_url" > "$ARTIFACT_DIR/api-run.json"
          jq -e '.schema_version=="servicetracer.demo-api-response.v1" and (.transactions|length)==20 and .report.investigation_boundary.exact_root_cause_claimed==false' "$ARTIFACT_DIR/api-run.json" > /dev/null

          curl --fail --silent --show-error \
            --request OPTIONS \
            --header "Origin: ${ALLOWED_ORIGIN}" \
            --header 'Access-Control-Request-Method: POST' \
            --dump-header "$ARTIFACT_DIR/cors-headers.txt" \
            --output /dev/null \
            "$run_url"
          grep -Eiq "^access-control-allow-origin: ${ALLOWED_ORIGIN}\r?$" "$ARTIFACT_DIR/cors-headers.txt"

          jq -n \
            --arg fqdn "$fqdn" \
            --arg health_url "$health_url" \
            --arg run_url "$run_url" \
            '{schema_version:"servicetracer.collector-demo-api-verification.v1",fqdn:$fqdn,health_url:$health_url,run_url:$run_url,tls_verified:true,health_verified:true,twenty_correlated_transactions_verified:true,cors_verified:true,service_validated:true}' \
            > "$ARTIFACT_DIR/verification.json"

      - name: Write evidence manifest
        if: always()
        env:
          OPERATION: ${{ inputs.operation }}
          REVIEWED_COMMIT: ${{ inputs.reviewed_commit }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          find "$ARTIFACT_DIR" -maxdepth 1 -type f ! -name evidence-manifest.json ! -name sha256sums.txt -print0 \
            | sort -z \
            | xargs -0 -r sha256sum \
            | awk '{print $1 "  " $2}' > "$ARTIFACT_DIR/sha256sums.txt"
          jq -n \
            --arg operation "$OPERATION" \
            --arg reviewed_commit "$REVIEWED_COMMIT" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --rawfile sums "$ARTIFACT_DIR/sha256sums.txt" \
            '{schema_version:"servicetracer.collector-demo-api-evidence.v1",operation:$operation,reviewed_commit:$reviewed_commit,run_id:$run_id,run_attempt:$run_attempt,generated_at:$generated_at,sha256sums:$sums}' \
            > "$ARTIFACT_DIR/evidence-manifest.json"

      - name: Write scoped workflow summary
        if: always()
        env:
          OPERATION: ${{ inputs.operation }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          DNS_LABEL: ${{ inputs.dns_label }}
        run: |
          {
            echo '## Collector-hosted demo API'
            echo "- Operation: \`$OPERATION\`"
            echo "- Resource group: \`$RESOURCE_GROUP\`"
            echo "- DNS label: \`$DNS_LABEL\`"
            echo '- The deployment uses a dedicated Standard Load Balancer and never writes demo child resources into the existing remote-access load balancer.'
            echo '- The collector VM and VNet remain existing referenced resources; Microsoft.Web/App Service remains excluded.'
            echo '- Readiness blocks any legacy remote-load-balancer child residue and records reusable partial target resources separately.'
            echo '- Deploy attempts always capture parent/nested ARM operations and post-deploy target inventory, including failures.'
            echo '- Detailed non-secret evidence is attached as a workflow artifact.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scoped evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-demo-api-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 30
