name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  servicetracer-tests:
    name: ServiceTracer tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate workflow observability state
        run: python .project/validate.py

      - name: Run unit tests
        env:
          PYTHONPATH: servicetracer/src
        run: |
          python -m unittest discover -s servicetracer/tests -v > /tmp/tests.log 2>&1
          tail -n 50 /tmp/tests.log

      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: servicetracer-unit-test-log
          path: /tmp/tests.log
          if-no-files-found: error

      - name: Collect operational evidence into durable spools
        env:
          PYTHONPATH: servicetracer/src
        run: |
          python -m servicetracer.collector_cli ingest \
            --spool /tmp/incident-evidence.jsonl \
            --input servicetracer/examples/source_records.jsonl \
            > /tmp/incident-collector-receipt.json
          python -m servicetracer.collector_cli ingest \
            --spool /tmp/containment-evidence.jsonl \
            --input servicetracer/examples/containment_source_records.jsonl \
            > /tmp/containment-collector-receipt.json
          python -m servicetracer.collector_cli status \
            --spool /tmp/incident-evidence.jsonl \
            > /tmp/collector-status.json
          python -m json.tool /tmp/incident-collector-receipt.json > /dev/null
          python -m json.tool /tmp/containment-collector-receipt.json > /dev/null
          python -m json.tool /tmp/collector-status.json > /dev/null

      - name: Run collected source-evidence CLI smoke test
        env:
          PYTHONPATH: servicetracer/src
        run: |
          python -m servicetracer.cli \
            --evidence-records /tmp/incident-evidence.jsonl \
            --containment-evidence-records /tmp/containment-evidence.jsonl \
            --adapter-config servicetracer/examples/evidence_adapters.json \
            --service-path servicetracer/examples/remote_access_service_path.json \
            --output /tmp/servicetracer-report.json
          python -m servicetracer.cli \
            --evidence-records /tmp/incident-evidence.jsonl \
            --containment-evidence-records /tmp/containment-evidence.jsonl \
            --adapter-config servicetracer/examples/evidence_adapters.json \
            --service-path servicetracer/examples/remote_access_service_path.json \
            --report-view technician-handoff \
            --output /tmp/technician-handoff-report.json
          python -m servicetracer.publish_cli \
            --input /tmp/technician-handoff-report.json \
            --output /tmp/public-technician-handoff-report.json \
            --source-id ci-collector \
            --servicetracer-version 0.5.0
          python -m json.tool /tmp/servicetracer-report.json > /dev/null
          python -m json.tool /tmp/technician-handoff-report.json > /dev/null
          python -m json.tool /tmp/public-technician-handoff-report.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('/tmp/servicetracer-report.json').read_text())
          handoff = json.loads(Path('/tmp/technician-handoff-report.json').read_text())
          public_report = json.loads(Path('/tmp/public-technician-handoff-report.json').read_text())
          status = json.loads(Path('/tmp/collector-status.json').read_text())
          assert status['records'] > 0
          assert status['records'] == status['unique_evidence_identities']
          assert report['input_mode'] == 'source_evidence'
          assert report['evidence_ingestion']['summary']['assembled_attempts'] == 2
          assert report['evidence_ingestion']['summary']['operational_history_records'] == 1
          assert report['load_balancer_assessment']['shallow_probe_gap_detected'] is True
          assert report['containment']['status'] == 'stabilized_under_containment'
          assert report['containment']['verification']['success_rate'] == 1.0
          assert report['containment']['evidence_ingestion']['summary']['assembled_attempts'] == 2
          assert handoff['status'] == 'technician_investigation_required'
          assert handoff['load_balancer']['status'] == 'healthy_under_configured_probe'
          assert handoff['localization']['suspect_backend'] == 'VPN-02'
          assert handoff['localization']['healthy_comparison_backend'] == 'VPN-01'
          assert handoff['investigation_boundary']['service_tracer_stops_at'] == 'VPN-02'
          assert handoff['root_cause']['status'] == 'not_determined_by_servicetracer'
          assert 'first_failed_stage' not in handoff
          assert 'radius_response' not in json.dumps(handoff)
          assert public_report['schema_version'] == 'servicetracer.public-report.v1'
          assert public_report['source']['id'] == 'ci-collector'
          assert public_report['report']['localization']['suspect_backend'] == 'VPN-02'
          assert public_report['report']['investigation_boundary']['exact_root_cause_claimed'] is False
          assert 'radius_response' not in json.dumps(public_report)
          PY

      - name: Verify preassembled replay compatibility
        env:
          PYTHONPATH: servicetracer/src
        run: |
          python -m servicetracer.demo_data \
            --scenario incident \
            --output /tmp/remote_access_attempts.jsonl
          python -m servicetracer.cli \
            --attempts /tmp/remote_access_attempts.jsonl \
            --service-path servicetracer/examples/remote_access_service_path.json \
            --output /tmp/replay-report.json
          python -m json.tool /tmp/replay-report.json > /dev/null

  bicep-validation:
    name: Bicep lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate collector VM contract
        run: python -m unittest discover -s infra/tests -v

      - name: Lint and build Bicep
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep install
            az bicep version
            az bicep lint --file infra/main.bicep
            az bicep build --file infra/main.bicep --outfile /tmp/main.json
            az bicep build-params --file infra/main.dev.bicepparam --outfile /tmp/main.parameters.json
            az bicep lint --file infra/demo-backend-api.bicep
            az bicep build --file infra/demo-backend-api.bicep --outfile /tmp/demo-backend-api.json
