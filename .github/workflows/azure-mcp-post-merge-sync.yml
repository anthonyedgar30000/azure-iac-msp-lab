name: Azure MCP architecture and Cloud Shell plan

on:
  pull_request:
    paths:
      - ".project/active-work.json"
      - ".project/environment-state.json"
      - ".project/handoffs/current-state.md"
      - ".project/handoffs/azure-mcp-current-state.md"
      - ".project/contracts/azure-mcp-reality-bridge.json"
      - ".project/reconciliations/azure-mcp-pr74.json"
      - ".project/reconciliations/post-merge-pr75-pr77.json"
      - ".project/reconciliations/openai-api-azure-mcp-cloud-shell-plan.json"
      - "docs/runbooks/openai-api-azure-mcp-cloud-shell.md"
      - "scripts/azure_mcp_cloud_shell_preflight.sh"
      - "scripts/validate_azure_mcp_post_merge_sync.py"
      - "tests/test_azure_mcp_post_merge_sync.py"
      - ".github/workflows/azure-mcp-post-merge-sync.yml"
  push:
    branches:
      - main
    paths:
      - ".project/active-work.json"
      - ".project/environment-state.json"
      - ".project/handoffs/current-state.md"
      - ".project/handoffs/azure-mcp-current-state.md"
      - ".project/contracts/azure-mcp-reality-bridge.json"
      - ".project/reconciliations/azure-mcp-pr74.json"
      - ".project/reconciliations/post-merge-pr75-pr77.json"
      - ".project/reconciliations/openai-api-azure-mcp-cloud-shell-plan.json"
      - "docs/runbooks/openai-api-azure-mcp-cloud-shell.md"
      - "scripts/azure_mcp_cloud_shell_preflight.sh"
      - "scripts/validate_azure_mcp_post_merge_sync.py"
      - "tests/test_azure_mcp_post_merge_sync.py"
      - ".github/workflows/azure-mcp-post-merge-sync.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out exact workflow commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Azure MCP architecture and Cloud Shell plan
        run: python scripts/validate_azure_mcp_post_merge_sync.py

      - name: Check Cloud Shell script syntax
        run: bash -n scripts/azure_mcp_cloud_shell_preflight.sh

      - name: Run Azure MCP regression tests
        run: python -m unittest tests/test_azure_mcp_post_merge_sync.py -v
