#cloud-config
package_update: false
package_upgrade: false

write_files:
  - path: /opt/servicetracer-demo/backend.py
    owner: root:root
    permissions: '0755'
    content: |
      #!/usr/bin/env python3
      import json
      import os
      import ssl
      from datetime import datetime, timezone
      from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
      from urllib.parse import parse_qs, urlparse

      BACKEND_ID = os.environ.get("SERVICETRACER_BACKEND_ID", "UNKNOWN")
      BACKEND_MODE = os.environ.get("SERVICETRACER_BACKEND_MODE", "healthy")
      LISTENER_PORT = int(os.environ.get("SERVICETRACER_LISTENER_PORT", "443"))

      HEALTHY_STAGES = [
          {"source_type": "vpn_syslog", "event": "tcp_established", "elapsed_ms": 82},
          {"source_type": "vpn_syslog", "event": "tls_completed", "elapsed_ms": 310},
          {"source_type": "vpn_syslog", "event": "radius_request_sent", "elapsed_ms": 12},
          {"source_type": "nps_windows", "event": "radius_access_accept", "elapsed_ms": 95},
          {"source_type": "vpn_syslog", "event": "vpn_address_assigned", "elapsed_ms": 140},
          {"source_type": "vpn_syslog", "event": "tunnel_established", "elapsed_ms": 120},
          {"source_type": "synthetic_probe", "event": "internal_dns_resolved", "elapsed_ms": 18},
          {"source_type": "nps_windows", "event": "kerberos_ticket_issued", "elapsed_ms": 130},
          {"source_type": "synthetic_probe", "event": "rdp_session_usable", "elapsed_ms": 980},
      ]

      FAILED_STAGES = [
          {"source_type": "vpn_syslog", "event": "tcp_established", "elapsed_ms": 90},
          {"source_type": "vpn_syslog", "event": "tls_completed", "elapsed_ms": 318},
          {"source_type": "vpn_syslog", "event": "radius_request_sent", "elapsed_ms": 20},
          {
              "source_type": "vpn_syslog",
              "event": "radius_response_timeout",
              "elapsed_ms": 15000,
              "retries": 3,
              "timeout_ms": 15000,
          },
      ]


      class Handler(BaseHTTPRequestHandler):
          server_version = "ServiceTracerDemoBackend/1.0"

          def _send_json(self, status_code, payload):
              body = json.dumps(payload, separators=(",", ":")).encode("utf-8")
              self.send_response(status_code)
              self.send_header("Content-Type", "application/json")
              self.send_header("Content-Length", str(len(body)))
              self.send_header("Cache-Control", "no-store")
              self.send_header("X-ServiceTracer-Backend", BACKEND_ID)
              self.end_headers()
              self.wfile.write(body)

          def do_GET(self):
              parsed = urlparse(self.path)
              if parsed.path == "/healthz":
                  self._send_json(
                      200,
                      {
                          "backend": BACKEND_ID,
                          "listener": "available",
                          "mode": BACKEND_MODE,
                      },
                  )
                  return

              if parsed.path != "/transaction":
                  self._send_json(404, {"error": "not_found", "backend": BACKEND_ID})
                  return

              query = parse_qs(parsed.query)
              correlation_id = query.get("correlation_id", ["unassigned"])[0]
              failed = BACKEND_MODE == "radius-timeout"
              stages = FAILED_STAGES if failed else HEALTHY_STAGES
              self._send_json(
                  503 if failed else 200,
                  {
                      "schema_version": "servicetracer.azure-demo-response.v1",
                      "observed_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
                      "correlation_id": correlation_id,
                      "backend": BACKEND_ID,
                      "transaction_status": "failed" if failed else "successful",
                      "failure_boundary": "radius_response" if failed else None,
                      "stages": stages,
                  },
              )

          def log_message(self, format_string, *args):
              print(
                  json.dumps(
                      {
                          "timestamp": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
                          "backend": BACKEND_ID,
                          "client": self.client_address[0],
                          "message": format_string % args,
                      },
                      separators=(",", ":"),
                  ),
                  flush=True,
              )


      def main():
          server = ThreadingHTTPServer(("0.0.0.0", LISTENER_PORT), Handler)
          context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
          context.load_cert_chain(
              certfile="/etc/servicetracer-demo/backend.crt",
              keyfile="/etc/servicetracer-demo/backend.key",
          )
          server.socket = context.wrap_socket(server.socket, server_side=True)
          server.serve_forever()


      if __name__ == "__main__":
          main()

  - path: /etc/systemd/system/servicetracer-demo-backend.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=ServiceTracer simulated remote-access backend
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      Environment=SERVICETRACER_BACKEND_ID=__BACKEND_ID__
      Environment=SERVICETRACER_BACKEND_MODE=__BACKEND_MODE__
      Environment=SERVICETRACER_LISTENER_PORT=__LISTENER_PORT__
      ExecStart=/usr/bin/python3 /opt/servicetracer-demo/backend.py
      Restart=always
      RestartSec=3
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectHome=true
      ProtectSystem=strict
      ReadOnlyPaths=/etc/servicetracer-demo

      [Install]
      WantedBy=multi-user.target

runcmd:
  - install -d -m 0755 /etc/servicetracer-demo
  - >-
    openssl req -x509 -newkey rsa:2048 -nodes -days 30
    -keyout /etc/servicetracer-demo/backend.key
    -out /etc/servicetracer-demo/backend.crt
    -subj '/CN=__BACKEND_ID__'
    -addext 'subjectAltName=DNS:__BACKEND_ID__'
  - chmod 0600 /etc/servicetracer-demo/backend.key
  - systemctl daemon-reload
  - systemctl enable --now servicetracer-demo-backend.service
  - systemctl is-active --quiet servicetracer-demo-backend.service
