#cloud-config
package_update: true
package_upgrade: false
packages:
  - ca-certificates
  - curl
  - git
  - openssl
  - python3-pip
  - python3-venv
  - xfsprogs

write_files:
  - path: /usr/local/sbin/bootstrap-servicetracer-collector
    owner: root:root
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      SOURCE_REPOSITORY='__COLLECTOR_SOURCE_REPOSITORY__'
      SOURCE_REF='__COLLECTOR_SOURCE_REF__'
      COLLECTOR_PORT='__COLLECTOR_PORT__'
      COLLECTOR_PRIVATE_IP='__COLLECTOR_PRIVATE_IP__'
      COLLECTOR_CERTIFICATE_NAME='__COLLECTOR_CERTIFICATE_NAME__'
      DATA_DEVICE='/dev/disk/azure/scsi1/lun0'
      DATA_ROOT='/var/lib/servicetracer'
      SOURCE_ROOT='/opt/servicetracer-src'
      VENV_ROOT='/opt/servicetracer'

      for _ in $(seq 1 120); do
        if [ -b "${DATA_DEVICE}" ]; then
          break
        fi
        sleep 1
      done

      if [ ! -b "${DATA_DEVICE}" ]; then
        echo "Managed evidence disk was not found at ${DATA_DEVICE}" >&2
        exit 1
      fi

      filesystem_type="$(blkid -s TYPE -o value "${DATA_DEVICE}" || true)"
      if [ -z "${filesystem_type}" ]; then
        mkfs.xfs -f "${DATA_DEVICE}"
      elif [ "${filesystem_type}" != 'xfs' ]; then
        echo "Evidence disk contains unsupported filesystem ${filesystem_type}" >&2
        exit 1
      fi

      mkdir -p "${DATA_ROOT}"
      disk_uuid="$(blkid -s UUID -o value "${DATA_DEVICE}")"
      if ! grep -q "UUID=${disk_uuid} ${DATA_ROOT} " /etc/fstab; then
        printf 'UUID=%s %s xfs defaults,nofail 0 2\n' "${disk_uuid}" "${DATA_ROOT}" >> /etc/fstab
      fi
      mountpoint -q "${DATA_ROOT}" || mount "${DATA_ROOT}"

      if ! getent group servicetracer >/dev/null; then
        groupadd --system servicetracer
      fi
      if ! id servicetracer >/dev/null 2>&1; then
        useradd --system --gid servicetracer --home-dir "${DATA_ROOT}" --shell /usr/sbin/nologin servicetracer
      fi

      install -d -o servicetracer -g servicetracer -m 0750 "${DATA_ROOT}/evidence"
      install -d -o root -g servicetracer -m 0750 "${DATA_ROOT}/config"
      install -d -o root -g servicetracer -m 0750 "${DATA_ROOT}/tls"

      if [ ! -f "${DATA_ROOT}/config/collector.env" ]; then
        umask 0077
        printf 'SERVICETRACER_COLLECTOR_TOKEN=%s\n' "$(openssl rand -hex 32)" > "${DATA_ROOT}/config/collector.env"
      fi
      chown root:servicetracer "${DATA_ROOT}/config/collector.env"
      chmod 0640 "${DATA_ROOT}/config/collector.env"

      if [ ! -f "${DATA_ROOT}/tls/collector.crt" ] || [ ! -f "${DATA_ROOT}/tls/collector.key" ]; then
        openssl req -x509 -newkey rsa:3072 -sha256 -nodes -days 397 \
          -subj "/CN=${COLLECTOR_CERTIFICATE_NAME}" \
          -addext "subjectAltName=DNS:${COLLECTOR_CERTIFICATE_NAME},IP:${COLLECTOR_PRIVATE_IP}" \
          -keyout "${DATA_ROOT}/tls/collector.key" \
          -out "${DATA_ROOT}/tls/collector.crt"
      fi
      chown root:servicetracer "${DATA_ROOT}/tls/collector.key" "${DATA_ROOT}/tls/collector.crt"
      chmod 0640 "${DATA_ROOT}/tls/collector.key"
      chmod 0644 "${DATA_ROOT}/tls/collector.crt"

      rm -rf "${SOURCE_ROOT}.new"
      git init "${SOURCE_ROOT}.new"
      git -C "${SOURCE_ROOT}.new" remote add origin "${SOURCE_REPOSITORY}"
      git -C "${SOURCE_ROOT}.new" fetch --depth 1 origin "${SOURCE_REF}"
      git -C "${SOURCE_ROOT}.new" checkout --detach FETCH_HEAD
      rm -rf "${SOURCE_ROOT}"
      mv "${SOURCE_ROOT}.new" "${SOURCE_ROOT}"

      python3 - <<'PY'
      import sys

      if sys.version_info < (3, 11):
          raise SystemExit(
              f"ServiceTracer requires Python 3.11 or newer; found {sys.version.split()[0]}"
          )
      PY

      python3 -m venv "${VENV_ROOT}"
      "${VENV_ROOT}/bin/python" -m pip install --upgrade pip setuptools wheel
      "${VENV_ROOT}/bin/python" -m pip install "${SOURCE_ROOT}/servicetracer"

      cat > /etc/systemd/system/servicetracer-collector.service <<EOF
      [Unit]
      Description=ServiceTracer operational evidence collector
      After=network-online.target var-lib-servicetracer.mount
      Wants=network-online.target
      RequiresMountsFor=${DATA_ROOT}

      [Service]
      Type=simple
      User=servicetracer
      Group=servicetracer
      EnvironmentFile=${DATA_ROOT}/config/collector.env
      ExecStart=${VENV_ROOT}/bin/servicetracer-collector http --listen 0.0.0.0 --port ${COLLECTOR_PORT} --spool ${DATA_ROOT}/evidence/evidence.jsonl --tls-cert ${DATA_ROOT}/tls/collector.crt --tls-key ${DATA_ROOT}/tls/collector.key
      Restart=on-failure
      RestartSec=5
      NoNewPrivileges=true
      PrivateTmp=true
      PrivateDevices=true
      ProtectSystem=strict
      ProtectHome=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectControlGroups=true
      RestrictSUIDSGID=true
      LockPersonality=true
      ReadWritePaths=${DATA_ROOT}

      [Install]
      WantedBy=multi-user.target
      EOF

      systemctl daemon-reload
      systemctl enable --now servicetracer-collector.service

      for _ in $(seq 1 30); do
        if curl --fail --silent --show-error --insecure "https://127.0.0.1:${COLLECTOR_PORT}/healthz" >/dev/null; then
          exit 0
        fi
        sleep 2
      done

      systemctl status servicetracer-collector.service --no-pager >&2 || true
      journalctl -u servicetracer-collector.service --no-pager -n 100 >&2 || true
      exit 1

runcmd:
  - [bash, -lc, /usr/local/sbin/bootstrap-servicetracer-collector]

final_message: 'ServiceTracer collector bootstrap completed after $UPTIME seconds.'
